<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSID_PRO - Official Mobile</title>
    
    <!-- Meta PWA & Mobile Guard -->
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Scripts: Lucide Icons & Tailwind CSS -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');

        :root {
            --bg-android: #000000;
            --surface-android: #121212;
            --accent-primary: #CD7F32;
            --android-blue: #4285F4;
            --text-primary: #E1E1E1;
            --system-bar: #000000;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Roboto', sans-serif;
            outline: none !important;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            width: 100vw;
        }

        /* Full responsive for Mobile and Desktop frame */
        .android-wrapper {
            width: 100%;
            height: 100vh;
            background-color: var(--bg-android);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 450px) {
            .android-wrapper {
                max-width: 420px;
                height: 850px;
                border: 10px solid #222;
                border-radius: 45px;
                box-shadow: 0 0 100px rgba(0,0,0,1);
            }
        }

        /* Android status bar mockup */
        .status-bar {
            height: 32px;
            background: var(--system-bar);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 12px;
            font-weight: 500;
            color: white;
            z-index: 1000;
            flex-shrink: 0;
        }
        .status-bar .icons { display: flex; gap: 8px; align-items: center; }

        /* Navigation system bar mockup */
        .nav-system-bar {
            height: 52px;
            background: var(--system-bar);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            flex-shrink: 0;
        }
        .nav-btn-circle { width: 50px; height: 100%; display: flex; justify-content: center; align-items: center; opacity: 0.5; transition: 0.2s; cursor: pointer; }
        .nav-btn-circle:active { opacity: 1; transform: scale(0.9); }

        .app-main {
            flex: 1; overflow-y: auto; position: relative; display: flex; flex-direction: column; background-color: var(--bg-android);
            scrollbar-width: none;
        }
        .app-main::-webkit-scrollbar { display: none; }

        .page { display: flex; flex-direction: column; width: 100%; height: 100%; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-ui {
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(15px);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0; z-index: 100;
        }

        .android-card { 
            background: var(--surface-android); 
            border-radius: 24px; padding: 24px; margin: 16px; border: 1px solid #2a2a2a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-label { display: block; margin-bottom: 10px; color: #777; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        
        .field-wrapper { position: relative; width: 100%; }
        .input-pin {
            width: 100%; padding: 20px; background: #000; border: 2px solid #333; border-radius: 18px; color: #fff;
            font-size: 1.8rem; font-weight: 900; text-align: center; letter-spacing: 12px; transition: 0.3s;
        }
        .input-pin:focus { border-color: var(--android-blue); box-shadow: 0 0 15px rgba(66, 133, 244, 0.2); }

        .eye-toggle { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #555; cursor: pointer; padding: 10px; z-index: 10; border: none; background: transparent; }

        .plate-container {
            background: #000; border: 2.5px solid #fff; border-radius: 20px; height: 95px; margin: 20px 0;
            display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
        }
        #plateInput {
            width: 100%; height: 100%; background: transparent !important; border: none !important; color: #ffffff !important; 
            font-size: 2.4rem; font-weight: 900; text-align: center; caret-color: var(--accent-primary); letter-spacing: 4px;
            text-transform: uppercase; padding: 0 15px; display: block; -webkit-text-fill-color: #ffffff !important;
        }
        #plateInput::placeholder { color: #333; font-size: 1.1rem; text-transform: none; letter-spacing: 0; }

        .btn-android {
            width: 100%; padding: 18px; border-radius: 18px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 12px; border: none; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .btn-android:active { transform: scale(0.96); opacity: 0.8; }
        .btn-android:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .btn-solid { background: #fff; color: #000; }
        .btn-ghost { background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .btn-success { background: #25D366; color: #fff; }

        .tab-bar { background: #050505; border-top: 1px solid #1a1a1a; display: flex; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { flex: 1; padding: 14px 0; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; color: #444; cursor: pointer; }
        .tab-item.active { color: #fff; }
        .tab-item.active i { color: var(--android-blue); stroke-width: 3; }

        .result-card { background: #000; border: 1px solid #222; border-radius: 24px; overflow: hidden; margin: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .result-header { background: #fff; color: #000; padding: 16px; text-align: center; font-weight: 900; font-size: 15px; letter-spacing: 1px; }
        .result-body { padding: 25px; font-size: 13.5px; line-height: 1.7; }
        .result-section { color: var(--accent-primary); font-weight: 900; margin: 22px 0 12px 0; border-bottom: 1.5px solid #222; font-size: 12px; padding-bottom: 5px; text-transform: uppercase; }
        .result-row { display: flex; margin-bottom: 10px; border-bottom: 1px solid #0d0d0d; padding-bottom: 6px; }
        .result-label { width: 115px; color: #666; flex-shrink: 0; font-weight: 500; }
        .result-value { color: #fff; font-weight: 600; word-break: break-word; }

        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.96); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 25px; backdrop-filter: blur(20px); }
        .modal-card { background: var(--surface-android); border-radius: 30px; padding: 30px; width: 100%; max-width: 340px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>

    <div class="android-wrapper">
        <div class="status-bar">
            <div id="liveClock">12:00</div>
            <div class="icons"><i data-lucide="signal" size="14"></i><i data-lucide="wifi" size="14"></i><i data-lucide="battery-full" size="14"></i></div>
        </div>

        <div class="app-main" id="scrollLayer">
            <!-- HEADER -->
            <div id="appHeader" class="header-ui hidden">
                <h1 class="font-black text-[#CD7F32] italic text-sm tracking-tight uppercase">CSID_PRO</h1>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="profileUnit" class="text-[9px] font-black text-white uppercase opacity-40"></p>
                        <p id="profileExpiry" class="text-[8px] font-black uppercase"></p>
                    </div>
                    <button onclick="window.processLogout()" class="text-red-500 p-2"><i data-lucide="log-out" size="20"></i></button>
                </div>
            </div>

            <!-- LOGIN PAGE -->
            <div id="pageLogin" class="page flex-1 flex flex-col justify-center">
                <div class="text-center mb-10">
                    <h1 class="text-4xl font-black text-white italic tracking-tighter uppercase">CSID_PRO</h1>
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-[6px] mt-2">Samsat Online Nasional</p>
                </div>
                <div class="android-card">
                    <div class="field-wrapper mb-6">
                        <label class="input-label">Akses Kode PIN</label>
                        <div class="relative">
                            <input type="password" id="loginPinField" class="input-pin" maxlength="10" inputmode="numeric" placeholder="••••••">
                            <button class="eye-toggle" onclick="window.togglePinMask()"><i id="pinEyeIcon" data-lucide="eye" size="22"></i></button>
                        </div>
                    </div>
                    <button class="btn-android btn-solid" id="btnLoginSubmit" onclick="window.handleUserLogin()">MASUK KE SISTEM</button>
                    <div class="pt-8 mt-10 border-t border-[#222]">
                        <button class="btn-android btn-ghost text-green-500 !bg-green-500/5 !border-none" onclick="window.contactAdminWA()">HUBUNGI ADMIN CS.ID</button>
                    </div>
                </div>
                <p id="configWarning" class="text-[10px] text-center text-red-500 font-bold mt-5 px-10 leading-relaxed"></p>
            </div>

            <!-- SEARCH PAGE -->
            <div id="pageSearch" class="page hidden flex-1">
                <div class="mt-14 text-center"><p class="text-[11px] font-black text-white/30 uppercase tracking-[5px]">Pemindaian Data Nasional</p></div>
                <div class="android-card">
                    <div class="plate-container">
                        <input type="text" id="plateInput" placeholder="Masukan Kode" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="characters" inputmode="text" oninput="window.handleNopolTyping(this)">
                    </div>
                    <button class="btn-android btn-solid" onclick="window.fetchVehicleData()"><i data-lucide="search-code" size="20"></i> CEK KENDARAAN</button>
                </div>
            </div>

            <!-- RESULT PAGE -->
            <div id="pageResult" class="page hidden flex-1">
                <div id="resultMount"></div>
                <div class="px-5 pb-14">
                    <div class="grid grid-cols-2 gap-4">
                        <button class="btn-android btn-ghost !py-4" onclick="window.copyToClipboard()"><i data-lucide="copy" size="18"></i> SALIN</button>
                        <button class="btn-android btn-success !py-4" onclick="window.shareToWA()"><i data-lucide="share-2" size="18"></i> WHATSAPP</button>
                    </div>
                    <button class="btn-android btn-ghost mt-4 !border-none text-xs text-gray-500 font-black uppercase" onclick="window.navigateTo('pageSearch')">Kembali</button>
                </div>
            </div>

            <!-- ADMIN PAGE -->
            <div id="pageAdmin" class="page hidden flex-1">
                <div class="p-6 flex justify-between items-center bg-zinc-950/50">
                    <h2 class="text-white font-black text-sm uppercase tracking-tighter">Control Panel</h2>
                    <button class="bg-white text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase" onclick="window.openRegisterModal()">+ PIN BARU</button>
                </div>
                <div class="px-6 py-4 border-b border-zinc-900"><p id="totalUsersCounter" class="text-accent-primary font-black text-[10px] uppercase tracking-widest text-center">TOTAL: 0 UNIT TERDAFTAR</p></div>
                <div id="agentsListMount" class="flex-1 px-4 py-4 pb-24"></div>
            </div>
        </div>

        <div id="bottomNavBar" class="tab-bar hidden">
            <div class="tab-item active" id="tab-search" onclick="window.navigateTo('pageSearch')"><i data-lucide="scan-line" size="24"></i><span class="mt-1">PENCARIAN</span></div>
            <div id="tabAdmin" class="tab-item hidden" onclick="window.navigateTo('pageAdmin')"><i data-lucide="shield-check" size="24"></i><span class="mt-1">ADMIN</span></div>
        </div>

        <div class="nav-system-bar">
            <div class="nav-btn-circle" onclick="window.handleSystemBack()"><i data-lucide="chevron-left" color="#888" size="22"></i></div>
            <div class="nav-btn-circle" onclick="location.reload()"><i data-lucide="circle" color="#888" size="18" stroke-width="3"></i></div>
            <div class="nav-btn-circle"><i data-lucide="square" color="#888" size="16" stroke-width="3"></i></div>
        </div>

        <div id="modalAlert" class="modal-overlay">
            <div class="modal-card">
                <h3 id="alertTitle" class="font-black text-white mb-3 uppercase text-sm">Sistem</h3>
                <p id="alertBody" class="text-white/60 text-xs mb-8 leading-relaxed"></p>
                <button class="btn-android btn-solid !py-4 text-xs font-black" onclick="window.closeAlertModal()">MENGERTI</button>
            </div>
        </div>

        <div id="modalAddPin" class="modal-overlay">
            <div class="modal-card !text-left">
                <h3 class="font-black text-white mb-6 uppercase text-center text-sm">Aktivasi PIN Baru</h3>
                <div class="field-wrapper mb-6 text-center">
                    <label class="input-label">6 Digit Angka</label>
                    <input type="text" id="newPinInput" class="input-pin !text-2xl !py-4" maxlength="6" inputmode="numeric" placeholder="000000">
                </div>
                <div class="flex gap-3">
                    <button id="btnConfirmReg" class="btn-android btn-solid flex-1 text-xs font-black" onclick="window.submitNewPin()">AKTIFKAN</button>
                    <button class="btn-android btn-ghost flex-1 text-xs font-black" onclick="window.closeRegisterModal()">BATAL</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =================================================================
        // 🖋 CONFIGURASI OTOMATIS BERDASARKAN PROYEK BOS (csid-pro-80860)
        // =================================================================
        const MY_FIREBASE_PROJECT = {
            apiKey: "AIzaSyC2V" + "kM_placeholder_apiKey", // Ganti placeholder ini jika bos punya API Key asli yang berbeda
            authDomain: "csid-pro-80860.firebaseapp.com",
            projectId: "csid-pro-80860",
            storageBucket: "csid-pro-80860.appspot.com",
            messagingSenderId: "367201827409",
            appId: "1:367201827409:web:32e8f1d3c0b0a8f9d0c2b1"
        };
        // =================================================================

        const firebaseConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
            ? JSON.parse(__firebase_config) : MY_FIREBASE_PROJECT;

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = (typeof __app_id !== 'undefined') ? __app_id : "CSID_PRO_APP_ULTIMATE_V1";

        let currentVehicleData = null;
        let navigationHistory = ['pageLogin'];

        setInterval(() => {
            const now = new Date();
            const clock = document.getElementById('liveClock');
            if(clock) clock.innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        window.handleNopolTyping = (el) => {
            const start = el.selectionStart;
            const val = el.value.toUpperCase().replace(/[^A-Z0-9\s]/g, '').replace(/\s\s+/g, ' ');
            if (el.value !== val) { el.value = val; try { el.setSelectionRange(start, start); } catch(e) {} }
        };

        window.togglePinMask = () => {
            const input = document.getElementById('loginPinField');
            const icon = document.getElementById('pinEyeIcon');
            input.type = (input.type === 'password') ? 'text' : 'password';
            icon.setAttribute('data-lucide', input.type === 'password' ? 'eye' : 'eye-off');
            if (window.lucide) window.lucide.createIcons();
        };

        window.initAuthProcess = async () => {
            if (auth.currentUser) return auth.currentUser;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                return auth.currentUser;
            } catch (e) { return null; }
        };

        const calcExpiryDays = (iso) => {
            if(!iso) return { d: 0, s: "UNLIMITED", c: "text-green-500" };
            const diff = new Date(iso) - new Date();
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            return days > 0 ? { d: days, s: `${days} HARI LAGI`, c: "text-green-500" } : { d: 0, s: "EXPIRED", c: "text-red-500" };
        };

        window.handleUserLogin = async () => {
            const pin = document.getElementById('loginPinField').value.trim();
            if(!pin) return window.showSystemAlert("INFO", "Masukkan Kode PIN Akses.");
            const btn = document.getElementById('btnLoginSubmit');
            btn.disabled = true; btn.innerText = "MENGHUBUNGKAN...";
            try {
                if(pin === "280189") { performLoginSuccess({username:"ADMIN", role:"admin"}); return; }
                const user = await window.initAuthProcess();
                if(!user) throw new Error("Auth Fail");
                const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'agents', pin));
                if(snap.exists()) {
                    const data = snap.data();
                    if(data.status === 'blocked') return window.showSystemAlert("DIBLOKIR", "PIN ini telah dinonaktifkan Admin.");
                    if(calcExpiryDays(data.expiryDate).d <= 0 && data.role !== 'admin') return window.showSystemAlert("EXPIRED", "Masa aktif PIN habis.");
                    performLoginSuccess(data);
                } else { window.showSystemAlert("GAGAL", "PIN tidak terdaftar."); }
            } catch (e) { window.showSystemAlert("ERROR", "Gagal menghubungi server database."); }
            finally { btn.disabled = false; btn.innerText = "MASUK KE SISTEM"; }
        };

        const performLoginSuccess = (data) => {
            localStorage.setItem('csid_active_session', data.username);
            document.getElementById('profileUnit').innerText = "UNIT: " + data.username;
            const expEl = document.getElementById('profileExpiry');
            if(data.role === 'admin') {
                expEl.innerText = "ADMIN MODE"; expEl.className = "text-[8px] font-black text-white";
                document.getElementById('tabAdmin').classList.remove('hidden');
                window.loadAdminData();
            } else {
                const exp = calcExpiryDays(data.expiryDate);
                expEl.innerText = exp.s; expEl.className = `text-[8px] font-black ${exp.c}`;
            }
            window.navigateTo('pageSearch');
        };

        window.submitNewPin = async () => {
            const pin = document.getElementById('newPinInput').value.trim();
            const btn = document.getElementById('btnConfirmReg');
            if(!pin || pin.length < 4) return window.showSystemAlert("INFO", "PIN minimal 4 digit.");
            if (btn) { btn.disabled = true; btn.innerText = "PROSES..."; }
            try {
                const user = await window.initAuthProcess();
                if(!user) return;
                let expiry = new Date(); expiry.setDate(expiry.getDate() + 30);
                await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'agents', pin), {
                    username: pin, role: 'agent', expiryDate: expiry.toISOString(), status: 'active'
                });
                window.closeRegisterModal(); 
                window.showSystemAlert("BERHASIL", `PIN ${pin} aktif 30 hari.`);
                document.getElementById('newPinInput').value = "";
            } catch (e) { window.showSystemAlert("GAGAL", "Gagal menyimpan PIN."); }
            finally { if (btn) { btn.disabled = false; btn.innerText = "AKTIFKAN"; } }
        };

        window.loadAdminData = async () => {
            const user = await window.initAuthProcess();
            if (!user) return;
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'agents'), (snap) => {
                const list = document.getElementById('agentsListMount');
                if(!list) return;
                document.getElementById('totalUsersCounter').innerText = `TOTAL: ${snap.size} UNIT TERDAFTAR`;
                list.innerHTML = "";
                snap.forEach(d => {
                    const a = d.data();
                    const exp = calcExpiryDays(a.expiryDate);
                    const isB = a.status === 'blocked';
                    list.innerHTML += `<div class="android-card !p-4 !m-0 !mb-3 border-l-4 ${isB ? 'border-l-red-600' : 'border-l-blue-600'} text-left text-white">
                        <div class="flex justify-between items-center">
                            <div><p class="text-xs font-black uppercase">ID: ${a.username}</p><p class="${exp.c} text-[9px] font-black mt-1">${exp.s}</p></div>
                            <div class="flex flex-col gap-2">
                                <button class="bg-white/10 text-white text-[8px] px-3 py-1.5 rounded-lg font-black uppercase" onclick="window.updateAgentStatus('${a.username}', '${a.status}')">${isB ? 'BUKA' : 'BLOK'}</button>
                                <button class="bg-red-900/30 text-red-500 text-[8px] px-3 py-1.5 rounded-lg font-black" onclick="window.removeAgent('${a.username}')">HAPUS</button>
                            </div>
                        </div>
                    </div>`;
                });
            }, (err) => console.log("Database connection error"));
        };

        window.updateAgentStatus = async (pin, status) => {
            try { await window.initAuthProcess(); await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'agents', pin), { status: status === 'active' ? 'blocked' : 'active' }); } catch (e) {}
        };

        window.removeAgent = async (u) => { if(confirm(`Hapus permanen PIN ${u}?`)) await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'agents', u)); };

        window.fetchVehicleData = async () => {
            const nopol = document.getElementById('plateInput').value.replace(/\s/g, '');
            if(!nopol) return window.showSystemAlert("INFO", "Masukkan kode TNKB.");
            const mount = document.getElementById('resultMount');
            mount.innerHTML = "<div class='py-32 text-center text-white animate-pulse'><i data-lucide='refresh-cw' class='animate-spin mx-auto mb-4 w-12 h-12 text-white'></i><p class='text-[10px] tracking-[6px] uppercase font-black'>Turbo Scan...</p></div>";
            if(window.lucide) window.lucide.createIcons();
            window.navigateTo('pageResult');
            try {
                const res = await fetch(`https://elangninja.space/?key=9611bbce88d6dbd96cdfd83619233efb&s=${nopol}`);
                const data = await res.json();
                if(data && data.length > 0) { currentVehicleData = data[0]; displayVehicle(data[0]); }
                else { mount.innerHTML = "<div class='android-card text-center text-red-500 font-black py-16 uppercase'>Data Tidak Ditemukan</div>"; }
            } catch (e) { mount.innerHTML = "<div class='android-card text-center text-white py-16 uppercase'>Gangguan Server</div>"; }
        };

        const displayVehicle = (d) => {
            const p = `${d.plate_region||''} ${d.plate_number||''} ${d.plate_series||''}`.trim().toUpperCase();
            document.getElementById('resultMount').innerHTML = `
                <div class="result-card fade-in">
                    <div class="result-header">HASIL PENCARIAN</div>
                    <div class="result-body font-bold text-white text-left">
                        <div class="result-section">IDENTITAS PEMILIK : 🖋</div>
                        <div class="result-row"><span class="result-label">No. Polisi</span><span class="result-value">: ${p}</span></div>
                        <div class="result-row"><span class="result-label">Pemilik</span><span class="result-value">: ${d.owner_name || '-'}</span></div>
                        <div class="result-row"><span class="result-label">Alamat</span><span class="result-value">: ${d.owner_address || '-'}</span></div>
                        <div class="result-row"><span class="result-label">Nik</span><span class="result-value">: ${d.nik || '-'}</span></div>
                        <div class="result-row"><span class="result-label">Pekerjaan</span><span class="result-value">: ${d.owner_job || '-'}</span></div>
                        <div class="result-section">DATA KENDARAAN: 🖋</div>
                        <div class="result-row"><span class="result-label">Merek</span><span class="result-value">: ${d.brand || '-'}</span></div>
                        <div class="result-row"><span class="result-label">Tipe</span><span class="result-value">: ${d.vehicle_type || '-'}</span></div>
                        <div class="result-row"><span class="result-label">Tahun</span><span class="result-value">: ${d.manufacture_year || '-'}</span></div>
                        <div class="result-row"><span class="result-label">Warna</span><span class="result-value">: ${d.color || '-'}</span></div>
                        <div class="result-row"><span class="result-label">Silinder</span><span class="result-value">: ${d.engine_capacity_cc || '-'} cc</span></div>
                        <div class="result-row"><span class="result-label">Roda</span><span class="result-value">: ${d.wheels || '0'}</span></div>
                        <div class="result-row"><span class="result-label">No. Rangka</span><span class="result-value">: ${d.chassis_number || '-'}</span></div>
                        <div class="result-row"><span class="result-label">No. Mesin</span><span class="result-value">: ${d.engine_number || '-'}</span></div>
                        <div class="result-section">DOKUMEN RESMI : 🖋</div>
                        <div class="result-row"><span class="result-label">No. Bpkb</span><span class="result-value">: ${d.bpkb_number || '-'}</span></div>
                        <div class="result-row"><span class="result-label">No. Stnk</span><span class="result-value">: ${d.stnk_number || '-'}</span></div>
                        <div class="result-row"><span class="result-label">Tanggal Daftar</span><span class="result-value">: ${d.registration_date || '-'}</span></div>
                        <div class="mt-8 pt-5 border-t border-zinc-900 text-[10px] text-gray-500 italic text-justify leading-relaxed uppercase">
                            NOTE : ⚠️ ALAT DI BUAT UNTUK MENGAKSES IDENTITAS RESMI KEPEMILIKAN KENDARAAN YANG SAH SESUAI TNKB RESMI PADA KENDARAAN.
                        </div>
                    </div>
                </div>`;
        };

        const createFinalText = (d) => {
            const p = `${d.plate_region||''} ${d.plate_number||''} ${d.plate_series||''}`.trim().toUpperCase();
            return `Sumber : Aplikasi CSID_PRO\n\nIDENTITAS PEMILIK : 🖋\nNo. Polisi : ${p}\nPemilik : ${d.owner_name || '-'}\nAlamat : ${d.owner_address || '-'}\nNik : ${d.nik || '-'}\nPekerjaan : ${d.owner_job || '-'}\n\nDATA KENDARAAN: 🖋\nMerek : ${d.brand || '-'}\nTipe : ${d.vehicle_type || '-'}\nTahun : ${d.manufacture_year || '-'}\nWarna : ${d.color || '-'}\nSilinder : ${d.engine_capacity_cc || '-'}\nRoda : ${d.wheels || '0'}\nNo. Rangka : ${d.chassis_number || '-'}\nNo. Mesin : ${d.engine_number || '-'}\n\nDOKUMEN RESMI : 🖋\nNo. Bpkb : ${d.bpkb_number || '-'}\nNo. Stnk : ${d.stnk_number || '-'}\nTanggal Daftar : ${d.registration_date || '-'}\n\nNOTE : ⚠️\n\nALAT DI BUAT UNTUK MENGAKSES IDENTITAS RESMI KEPEMILIKAN KENDARAAN YANG SAH SESUAI TNKB RESMI PADA KENDARAAN.\n\nCP Link Aplikasi : CS.ID 👥\nhttps://wa.me/628136900872`;
        };

        window.copyToClipboard = () => { if(!currentVehicleData) return; const el = document.createElement('textarea'); el.value = createFinalText(currentVehicleData); document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); window.showSystemAlert("SUKSES", "Data berhasil disalin."); };
        window.shareToWA = () => { if(!currentVehicleData) return; window.open(`https://wa.me/?text=${encodeURIComponent(createFinalText(currentVehicleData))}`, '_blank'); };
        window.contactAdminWA = () => { const u = Math.floor(100000 + Math.random() * 900000); window.open(`https://wa.me/628136900872?text=${encodeURIComponent("Halo Admin CSID_PRO, mohon aktifkan PIN saya.\n\nKODE PIN: "+u+"\nMasa Aktif: 1 Bulan")}`, '_blank'); };

        window.navigateTo = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            const target = document.getElementById(id);
            if(target) { target.classList.remove('hidden'); target.classList.add('fade-in'); }
            const isLogin = id === 'pageLogin';
            document.getElementById('appHeader').classList.toggle('hidden', isLogin);
            document.getElementById('bottomNavBar').classList.toggle('hidden', isLogin);
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            if(id === 'pageSearch') document.getElementById('tab-search')?.classList.add('active');
            if(id === 'pageAdmin') document.getElementById('tabAdmin')?.classList.add('active');
            if (window.lucide) window.lucide.createIcons();
            document.getElementById('scrollLayer').scrollTop = 0;
            if(navigationHistory[navigationHistory.length-1] !== id) navigationHistory.push(id);
        };

        window.handleSystemBack = () => { if(navigationHistory.length > 1) { navigationHistory.pop(); const lastPage = navigationHistory.pop(); window.navigateTo(lastPage); } };

        window.showSystemAlert = (t, m) => { 
            document.getElementById('alertTitle').innerText = t; 
            document.getElementById('alertBody').innerText = m; 
            document.getElementById('modalAlert').style.display = 'flex'; 
        };
        window.closeAlertModal = () => { document.getElementById('modalAlert').style.display = 'none'; };
        window.processLogout = () => { localStorage.clear(); location.reload(); };
        window.openRegisterModal = () => { document.getElementById('modalAddPin').style.display = 'flex'; };
        window.closeRegisterModal = () => { document.getElementById('modalAddPin').style.display = 'none'; };

        window.onload = async () => {
            if (window.lucide) window.lucide.createIcons();
            const user = await window.initAuthProcess();
            const saved = localStorage.getItem('csid_active_session');
            if(saved) {
                if(saved === 'ADMIN') performLoginSuccess({username:'ADMIN', role:'admin'});
                else if(user) {
                    try {
                        const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'agents', saved));
                        if(snap.exists()) {
                            const d = snap.data();
                            if(calcExpiryDays(d.expiryDate).d > 0 && d.status !== 'blocked') performLoginSuccess(d); 
                            else window.navigateTo('pageLogin');
                        } else window.navigateTo('pageLogin');
                    } catch (e) { window.navigateTo('pageLogin'); }
                } else window.navigateTo('pageLogin');
            } else window.navigateTo('pageLogin');
        };
    </script>
</body>
</html>
