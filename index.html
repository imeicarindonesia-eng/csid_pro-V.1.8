<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡CSID_PRO - Mobile Elite</title>
    
    <!-- PWA & Mobile Optimization -->
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@700&display=swap');

        :root {
            --bg-android: #000000;
            --surface-android: #121212;
            --accent-primary: #CD7F32; /* Bronze */
            --android-blue: #4285F4;
            --text-primary: #E1E1E1;
            --system-bar: #000000;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Roboto', sans-serif;
            outline: none !important;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            width: 100vw;
        }

        .android-wrapper {
            width: 100%;
            height: 100vh;
            background-color: var(--bg-android);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 450px) {
            .android-wrapper {
                max-width: 420px;
                height: 850px;
                border: 10px solid #222;
                border-radius: 45px;
                box-shadow: 0 0 100px rgba(0,0,0,1);
            }
        }

        .nav-system-bar {
            height: 52px;
            background: var(--system-bar);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            flex-shrink: 0;
        }
        .nav-btn-circle { width: 50px; height: 100%; display: flex; justify-content: center; align-items: center; opacity: 0.5; transition: 0.2s; cursor: pointer; }
        .nav-btn-circle:active { opacity: 1; transform: scale(0.9); }

        .app-main {
            flex: 1; overflow-y: auto; position: relative; display: flex; flex-direction: column; background-color: var(--bg-android);
            scrollbar-width: none;
        }
        .app-main::-webkit-scrollbar { display: none; }

        .page { display: flex; flex-direction: column; width: 100%; height: 100%; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-ui {
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(15px);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0; z-index: 100;
        }

        .android-card { 
            background: var(--surface-android); 
            border-radius: 24px; padding: 24px; margin: 16px; border: 1px solid #2a2a2a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-label { display: block; margin-bottom: 10px; color: #777; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        
        .input-pin {
            width: 100%; padding: 18px; background: #000; border: 2px solid #333; border-radius: 18px; color: #fff;
            font-size: 1.8rem; font-weight: 900; text-align: center; letter-spacing: 10px; transition: 0.3s;
        }

        /* AREA NOPOL - STABIL & DYNAMIC FONT */
        .plate-container {
            background: #000; border: 3px solid #fff; border-radius: 20px; height: 95px; margin: 20px 0;
            display: flex; align-items: center; position: relative; overflow: hidden; width: 100%;
        }
        #plateInput {
            flex: 1; height: 100%; background: transparent !important; border: none !important; color: #ffffff !important; 
            font-size: 1.8rem; font-weight: 900; text-align: center; caret-color: var(--accent-primary);
            text-transform: uppercase; padding: 0 50px; display: block; width: 100%;
            letter-spacing: 1px; font-family: 'Roboto Mono', monospace;
        }
        #plateInput::placeholder { 
            text-transform: lowercase; font-size: 1rem; color: #ffffff; opacity: 0.5; font-weight: 400; font-family: 'Roboto', sans-serif;
        }

        .input-action-btn { 
            position: absolute; width: 45px; height: 100%; display: flex; align-items: center; justify-content: center;
            color: #ffffff; opacity: 0.8; cursor: pointer; transition: 0.2s; z-index: 10;
        }
        .input-action-btn:active { opacity: 1; transform: scale(0.9); }
        .btn-scan { left: 5px; }
        .btn-paste { right: 5px; }

        .btn-android {
            width: 100%; padding: 18px; border-radius: 18px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 12px; border: none; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .btn-android:active { transform: scale(0.96); opacity: 0.8; }
        .btn-solid { background: #fff; color: #000; }
        .btn-ghost { background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .btn-success { background: #25D366; color: #fff; }

        .tab-bar { background: #050505; border-top: 1px solid #1a1a1a; display: flex; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { flex: 1; padding: 14px 0; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; color: #444; cursor: pointer; }
        .tab-item.active { color: #fff; }

        /* UI HASIL PENCARIAN ELEGAN (SESUAI TEMPLATE) */
        .result-card { background: #000; border: 1px solid #222; border-radius: 24px; overflow: hidden; margin: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .result-header { background: #fff; color: #000; padding: 16px; text-align: center; font-weight: 900; font-size: 14px; }
        .result-body { padding: 25px; font-size: 13px; line-height: 1.6; color: #fff; text-align: left; }
        .result-section { color: var(--accent-primary); font-weight: 900; margin: 22px 0 10px 0; border-bottom: 1.5px solid #222; font-size: 11px; padding-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .result-row { display: flex; margin-bottom: 4px; }
        .res-label { width: 115px; color: #888; font-weight: 500; flex-shrink: 0; }
        .res-val { color: #fff; font-weight: 700; word-break: break-word; }

        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.96); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 25px; backdrop-filter: blur(20px); }
        .modal-card { background: var(--surface-android); border-radius: 30px; padding: 30px; width: 100%; max-width: 340px; border: 1px solid #333; text-align: center; }
    
        .color-bronze { color: var(--accent-primary); font-weight: 900; font-family: monospace; }
        
        #ocrLoading { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

    <div id="ocrLoading">
        <div class="w-12 h-12 border-4 border-white/20 border-t-[#CD7F32] rounded-full animate-spin mb-4"></div>
        <p class="font-black text-[10px] uppercase tracking-widest text-white animate-pulse">⚡ AI Menganalisa Plat...</p>
    </div>

    <div class="android-wrapper">
        <div class="app-main" id="scrollLayer">
            <!-- HEADER -->
            <div id="appHeader" class="header-ui hidden">
                <h1 class="font-black text-[#CD7F32] italic text-lg tracking-tight uppercase">⚡CSID_PRO</h1>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="profileUnit" class="text-[9px] font-black text-white uppercase opacity-40"></p>
                        <p id="profileExpiry" class="text-[8px] font-black uppercase color-bronze">Memuat...</p>
                    </div>
                    <button onclick="window.processLogout()" class="text-red-500 p-2"><i data-lucide="log-out" size="22"></i></button>
                </div>
            </div>

            <!-- LOGIN PAGE -->
            <div id="pageLogin" class="page flex-1 flex flex-col justify-center">
                <div class="text-center mb-10">
                    <h1 class="text-5xl font-black text-white italic tracking-tighter uppercase">⚡CSID_PRO</h1>
                    <p class="text-[11px] font-black text-blue-500 uppercase tracking-[6px] mt-2">Samsat Online Nasional</p>
                </div>
                <div class="android-card">
                    <div class="field-wrapper mb-6">
                        <label class="input-label">Akses Kode PIN</label>
                        <input type="password" id="loginPinField" class="input-pin" maxlength="10" inputmode="numeric" placeholder="••••••">
                    </div>
                    <button class="btn-android btn-solid" id="btnLoginSubmit" onclick="window.handleUserLogin()">MASUK KE SISTEM</button>
                    <button class="btn-android btn-ghost mt-4 !border-dashed border-gray-600 !text-gray-400" onclick="window.openRegWA()">
                        <i data-lucide="message-circle" size="18"></i> DAFTAR AKSES (WA)
                    </button>
                </div>
                <p id="statusServer" class="text-[10px] text-center text-gray-500 font-bold mt-5 px-10 leading-relaxed">Menghubungkan database...</p>
            </div>

            <!-- SEARCH PAGE -->
            <div id="pageSearch" class="page hidden flex-1">
                <div class="mt-14 text-center">
                    <p class="text-[11px] font-black text-white uppercase tracking-[5px]">SELAMAT DATANG</p>
                </div>
                <div class="android-card">
                    <div class="plate-container">
                        <div class="input-action-btn btn-scan" onclick="window.triggerCamera()">
                            <i data-lucide="camera" size="24"></i>
                        </div>
                        <input type="text" id="plateInput" placeholder="masukan nomor" autocomplete="off" oninput="window.handleNopolTyping(this)">
                        <div class="input-action-btn btn-paste" onclick="window.handlePaste()">
                            <i data-lucide="clipboard-list" size="24"></i>
                        </div>
                    </div>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="window.handleImageUpload(event)">
                    <button class="btn-android btn-solid" onclick="window.fetchVehicleData()">
                        <i data-lucide="search-code" size="20"></i> CEK KENDARAAN
                    </button>
                </div>
            </div>

            <!-- RESULT PAGE -->
            <div id="pageResult" class="page hidden flex-1">
                <div id="resultMount"></div>
                <div class="px-5 pb-14">
                    <div class="grid grid-cols-2 gap-4">
                        <button class="btn-android btn-ghost !py-4" onclick="window.copyToClipboard()"><i data-lucide="copy" size="18"></i> SALIN</button>
                        <button class="btn-android btn-success !py-4" onclick="window.shareToWA()"><i data-lucide="share-2" size="18"></i> WHATSAPP</button>
                    </div>
                    <button class="btn-android btn-ghost mt-4 !border-none text-xs text-gray-500 font-black uppercase" onclick="window.navigateTo('pageSearch')">Kembali</button>
                </div>
            </div>

            <!-- ADMIN PAGE -->
            <div id="pageAdmin" class="page hidden flex-1">
                <div class="p-6 flex justify-between items-center bg-zinc-950/50">
                    <h2 class="text-white font-black text-sm uppercase tracking-tighter">Control Panel</h2>
                    <button class="bg-white text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase" onclick="window.openRegisterModal()">+ PIN BARU</button>
                </div>
                <div class="px-6 py-4 border-b border-zinc-900"><p id="totalUsersCounter" class="text-accent-primary font-black text-[10px] uppercase tracking-widest text-center">MEMUAT DATA...</p></div>
                <div id="agentsListMount" class="flex-1 px-4 py-4 pb-24"></div>
            </div>
        </div>

        <!-- TAB BAR -->
        <div id="bottomNavBar" class="tab-bar hidden">
            <div class="tab-item active" id="tab-search" onclick="window.navigateTo('pageSearch')">
                <i data-lucide="scan-line" size="24"></i><span class="mt-1 uppercase text-[9px]">Pencarian</span>
            </div>
            <div id="tabAdmin" class="tab-item hidden" onclick="window.navigateTo('pageAdmin')">
                <i data-lucide="shield-check" size="24"></i><span class="mt-1 uppercase text-[9px]">Admin</span>
            </div>
        </div>

        <div class="nav-system-bar">
            <div class="nav-btn-circle" onclick="window.handleSystemBack()"><i data-lucide="chevron-left" color="#888" size="22"></i></div>
            <div class="nav-btn-circle" onclick="location.reload()"><i data-lucide="circle" color="#888" size="18"></i></div>
            <div class="nav-btn-circle"><i data-lucide="square" color="#888" size="16"></i></div>
        </div>

        <!-- MODALS -->
        <div id="modalAlert" class="modal-overlay">
            <div class="modal-card">
                <h3 id="alertTitle" class="font-black text-white mb-3 uppercase text-sm">Sistem</h3>
                <p id="alertBody" class="text-white/60 text-xs mb-8 leading-relaxed"></p>
                <button class="btn-android btn-solid !py-4 text-xs font-black" onclick="window.closeAlertModal()">MENGERTI</button>
            </div>
        </div>

        <div id="modalAddPin" class="modal-overlay">
            <div class="modal-card !text-left">
                <h3 class="font-black text-white mb-6 uppercase text-center text-sm">Aktivasi PIN Baru</h3>
                <div class="field-wrapper mb-6 text-center">
                    <label class="input-label">6 Digit Angka</label>
                    <input type="text" id="newPinInput" class="input-pin !text-2xl !py-4" maxlength="6" inputmode="numeric" placeholder="000000">
                </div>
                <div class="flex gap-3">
                    <button id="btnRegSubmit" class="btn-android btn-solid flex-1 text-xs font-black" onclick="window.submitNewPin()">AKTIFKAN</button>
                    <button class="btn-android btn-ghost flex-1 text-xs font-black" onclick="window.closeRegisterModal()">BATAL</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =================================================================
        // ✅ KONFIGURASI FINAL ADAPTIF
        // =================================================================
        const apiKey = ""; // Otomatis oleh lingkungan, ganti dengan milik Anda untuk APK Luar.
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBonuHp4nd-YZKWV5IM_2HRcfJ2TQ4zJaY", 
            authDomain: "gen-lang-client-0221970857.firebaseapp.com",
            projectId: "gen-lang-client-0221970857",
            storageBucket: "gen-lang-client-0221970857.firebasestorage.app",
            messagingSenderId: "483674298302",
            appId: "1:483674298302:web:1fe90dc43295df2abecbef"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : '⚡CSID_PRO_FINAL_V1'; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let vehicleData = null; 
        let countdownInterval = null;

        // FINGERPRINT HP (1 HP 1 PIN)
        const getDeviceId = () => {
            let id = localStorage.getItem('csid_device_fingerprint');
            if(!id) {
                id = 'UID-' + Math.random().toString(36).substring(2, 12).toUpperCase();
                localStorage.setItem('csid_device_fingerprint', id);
            }
            return id;
        };

        const initAuth = async () => {
            if (currentUser) return currentUser;
            return new Promise((resolve) => {
                const triggerAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("Auth Fail", e); }
                };
                const unsub = onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        document.getElementById('statusServer').innerText = "✅ Server Terhubung";
                        unsub(); resolve(user);
                    }
                });
                triggerAuth();
                setTimeout(() => {
                    if(!currentUser) document.getElementById('statusServer').innerText = "⚠️ Masalah Koneksi. Refresh?";
                    resolve(null);
                }, 10000);
            });
        };

        // --- FITUR SCAN & PASTE ---
        window.handlePaste = async () => {
            const text = prompt("Tempel nomor plat di sini:");
            if (text) {
                const cleaned = text.toUpperCase().replace(/[^A-Z0-9]/g, '');
                const input = document.getElementById('plateInput');
                input.value = cleaned;
                window.handleNopolTyping(input);
            }
        };

        window.triggerCamera = () => { document.getElementById('cameraInput').click(); };

        window.handleImageUpload = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result.split(',')[1];
                document.getElementById('ocrLoading').style.display = 'flex';
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${firebaseConfig.apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Extract license plate from this vehicle image. Return ONLY characters. Example: BL8283S." }, { inlineData: { mimeType: "image/png", data: base64Data } }] }]
                        })
                    });
                    const result = await response.json();
                    const nopol = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
                    if (nopol) {
                        const cleaned = nopol.toUpperCase().replace(/[^A-Z0-9]/g, '');
                        const input = document.getElementById('plateInput');
                        input.value = cleaned;
                        window.handleNopolTyping(input);
                    }
                } catch (err) { window.showSystemAlert("AI ERROR", "Gagal membaca foto."); } 
                finally { document.getElementById('ocrLoading').style.display = 'none'; event.target.value = ""; }
            };
            reader.readAsDataURL(file);
        };

        const startLiveCountdown = (expiryIso) => {
            if(countdownInterval) clearInterval(countdownInterval);
            if(expiryIso === "PERMANEN") { document.getElementById('profileExpiry').innerText = "STATUS: PERMANEN"; return; }
            const updateUI = () => {
                const diff = new Date(expiryIso).getTime() - new Date().getTime();
                if (diff <= 0) {
                    document.getElementById('profileExpiry').innerText = "EXPIRED";
                    document.getElementById('profileExpiry').style.color = "#ef4444";
                    clearInterval(countdownInterval); return;
                }
                const d = Math.floor(diff/(1000*60*60*24)), h = Math.floor((diff%(1000*60*60*24))/(1000*60*60)), m = Math.floor((diff%(1000*60*60))/(1000*60)), s = Math.floor((diff%(1000*60))/1000);
                document.getElementById('profileExpiry').innerText = `SISA: ${d}H ${h}J ${m}M ${s}D`;
            };
            updateUI(); countdownInterval = setInterval(updateUI, 1000);
        };

        // --- STABILISATOR PENGETIKAN ---
        window.handleNopolTyping = (el) => {
            const start = el.selectionStart;
            const originalVal = el.value;
            const cleaned = originalVal.toUpperCase().replace(/[^A-Z0-9]/g, '');
            
            // Auto Font Resize
            if (cleaned.length > 10) el.style.fontSize = "1.4rem";
            else if (cleaned.length > 8) el.style.fontSize = "1.6rem";
            else el.style.fontSize = "1.8rem";

            if (originalVal !== cleaned) {
                el.value = cleaned;
                try { el.setSelectionRange(start, start); } catch(e) {}
            }
            el.scrollLeft = el.scrollWidth;
        };

        window.handleUserLogin = async () => {
            const pin = document.getElementById('loginPinField').value.trim();
            if(!pin) return;
            const btn = document.getElementById('btnLoginSubmit');
            btn.disabled = true; btn.innerText = "VERIFIKASI...";
            try {
                if(pin === "280189") { performLoginSuccess({username:"ADMIN", role:"admin", expiryDate: "PERMANEN"}); return; }
                const user = await initAuth();
                if(!user) throw new Error();
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'agents', pin));
                if(snap.exists()) {
                    const data = snap.data(), myDevice = getDeviceId();
                    // 1 HP 1 PIN LOCK
                    if (data.deviceId && data.deviceId !== myDevice) {
                        window.showSystemAlert("AKSES DITOLAK", "PIN ini sudah terikat di HP lain.");
                        return;
                    }
                    if (!data.deviceId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'agents', pin), { deviceId: myDevice });
                    if (data.expiryDate !== "PERMANEN" && new Date() > new Date(data.expiryDate)) {
                        window.showSystemAlert("MASA AKTIF HABIS", "Silakan hubungi Admin."); return;
                    }
                    performLoginSuccess(data);
                } else { window.showSystemAlert("GAGAL", "PIN tidak terdaftar."); }
            } catch (e) { window.showSystemAlert("ERROR", "Database gagal."); } 
            finally { btn.disabled = false; btn.innerText = "MASUK KE SISTEM"; }
        };

        const performLoginSuccess = (data) => {
            localStorage.setItem('csid_active_session', data.username);
            document.getElementById('profileUnit').innerText = "ID: " + data.username;
            startLiveCountdown(data.expiryDate);
            if(data.role === 'admin') {
                document.getElementById('tabAdmin').classList.remove('hidden');
                window.loadAdminData();
            }
            window.navigateTo('pageSearch');
        };

        window.submitNewPin = async () => {
            const pin = document.getElementById('newPinInput').value.trim();
            if(pin.length < 4) return window.showSystemAlert("INFO", "PIN minimal 4 angka.");
            try {
                await initAuth();
                const expiry = new Date(); expiry.setDate(expiry.getDate() + 30);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'agents', pin), { 
                    username: pin, role: 'agent', status: 'active', 
                    createdAt: new Date().toISOString(), expiryDate: expiry.toISOString(), deviceId: null
                });
                window.closeRegisterModal(); window.showSystemAlert("BERHASIL", `PIN ${pin} aktif.`);
            } catch (e) { window.showSystemAlert("GAGAL", "Izin ditolak!"); } 
        };

        window.loadAdminData = async () => {
            const user = await initAuth();
            if (!user) return;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'agents'), (snap) => {
                const list = document.getElementById('agentsListMount');
                if(!list) return;
                document.getElementById('totalUsersCounter').innerText = `TOTAL: ${snap.size} UNIT AKTIF`;
                list.innerHTML = "";
                snap.forEach(d => {
                    const a = d.data();
                    let devLabel = a.deviceId ? `<span class="text-[#CD7F32] font-black">[TERKUNCI]</span>` : `<span class="text-white/30">[KOSONG]</span>`;
                    list.innerHTML += `<div class="android-card !p-4 !m-0 !mb-3 border-l-4 border-[#CD7F32] text-left text-white flex justify-between items-center">
                        <div><p class="text-xs font-black">ID: ${a.username}</p><p class="text-[9px] uppercase mt-1">${devLabel}</p></div>
                        <div class="flex gap-2">
                            ${a.deviceId ? `<button class="bg-blue-600 text-white p-2 rounded-lg" onclick="window.resetDevice('${a.username}')"><i data-lucide="refresh-cw" size="14"></i></button>` : ''}
                            <button class="text-red-500 p-2" onclick="window.removeAgent('${a.username}')"><i data-lucide="trash-2" size="16"></i></button>
                        </div>
                    </div>`;
                });
                if (window.lucide) window.lucide.createIcons();
            });
        };

        window.resetDevice = async (pin) => {
            if(confirm(`Reset HP untuk PIN ${pin}?`)) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'agents', pin), { deviceId: null });
                window.showSystemAlert("BERHASIL", `PIN ${pin} bisa login di HP baru.`);
            }
        };

        window.removeAgent = async (u) => { if(confirm(`Hapus PIN ${u}?`)) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'agents', u)); } };

        window.fetchVehicleData = async () => {
            const nopol = document.getElementById('plateInput').value.replace(/\s/g, '');
            if(!nopol) return;
            window.navigateTo('pageResult');
            document.getElementById('resultMount').innerHTML = "<div class='py-32 text-center text-white animate-pulse'><p class='font-black tracking-widest uppercase'>Turbo Scan...</p></div>";
            try {
                const res = await fetch(`https://elangninja.space/?key=9611bbce88d6dbd96cdfd83619233efb&s=${nopol}`);
                const data = await res.json();
                if(data && data.length > 0) { vehicleData = data[0]; displayVehicle(data[0]); }
                else document.getElementById('resultMount').innerHTML = "<div class='android-card text-center text-red-500 font-black uppercase'>Data Tidak Ditemukan</div>";
            } catch (e) { document.getElementById('resultMount').innerHTML = "<div class='android-card text-center text-white uppercase'>Gangguan Server</div>"; }
        };

        // --- RENDER HASIL UI & FORMAT TEKS (IDENTIK TEMPLATE BOS) ---
        const displayVehicle = (d) => {
            const p = `${d.plate_region||''} ${d.plate_number||''} ${d.plate_series||''}`.trim().toUpperCase();
            document.getElementById('resultMount').innerHTML = `
                <div class="result-card fade-in">
                    <div class="result-header uppercase tracking-widest font-black">HASIL PENCARIAN</div>
                    <div class="result-body">
                        <p class="mb-4 text-xs">Sumber : Aplikasi cs.id pro</p>

                        <div class="result-section">IDENTITAS PEMILIK : 🖋</div>
                        <div class="result-row"><span class="res-label">No. Polisi</span><span class="res-val">: ${p}</span></div>
                        <div class="result-row"><span class="res-label">Pemilik</span><span class="res-val">: ${d.owner_name || '-'}</span></div>
                        <div class="result-row"><span class="res-label">Alamat</span><span class="res-val">: ${d.owner_address || '-'}</span></div>
                        <div class="result-row"><span class="res-label">Nik</span><span class="res-val">: ${d.nik || '-'}</span></div>
                        <div class="result-row"><span class="res-label">Pekerjaan</span><span class="res-val">: ${d.job || '-'}</span></div>

                        <div class="result-section">DATA KENDARAAN: 🖋</div>
                        <div class="result-row"><span class="res-label">Merek</span><span class="res-val">: ${d.brand || '-'}</span></div>
                        <div class="result-row"><span class="res-label">Tipe</span><span class="res-val">: ${d.model || '-'}</span></div>
                        <div class="result-row"><span class="res-label">Tahun</span><span class="res-val">: ${d.manufacture_year || '-'}</span></div>
                        <div class="result-row"><span class="res-label">Warna</span><span class="res-val">: ${d.color || '-'}</span></div>
                        <div class="result-row"><span class="res-label">Silinder</span><span class="res-val">: ${d.engine_capacity || '-'} cc</span></div>
                        <div class="result-row"><span class="res-label">Roda</span><span class="res-val">: ${d.wheels || '0'}</span></div>
                        <div class="result-row"><span class="res-label">No. Rangka</span><span class="res-val">: ${d.chassis_number || '-'}</span></div>
                        <div class="result-row"><span class="res-label">No. Mesin</span><span class="res-val">: ${d.engine_number || '-'}</span></div>

                        <div class="result-section">DOKUMEN RESMI : 🖋</div>
                        <div class="result-row"><span class="res-label">No. Bpkb</span><span class="res-val">: ${d.bpkb_number || '-'}</span></div>
                        <div class="result-row"><span class="res-label">No. Stnk</span><span class="res-val">: ${d.stnk_number || '-'}</span></div>
                        <div class="result-row"><span class="res-label">Tanggal Daftar</span><span class="res-val">: ${d.registration_date || '-'}</span></div>

                        <div class="mt-6 pt-4 border-t border-zinc-900 text-[10px] text-gray-500 italic uppercase">
                            <p class="font-black text-gray-400 mb-2">NOTE : ⚠️</p>
                            ALAT DI BUAT UNTUK MENGAKSES IDENTITAS RESMI KEPEMILIKAN KENDARAAN YANG SAH SESUAI TNKB RESMI PADA KENDARAAN.
                        </div>

                        <div class="mt-4 text-[11px] font-black">
                            <p class="text-[#CD7F32] mb-1">CP Link Aplikasi : CS.ID 👥</p>
                            <p class="text-blue-500 underline">https://wa.me/628136900872</p>
                        </div>
                    </div>
                </div>`;
        };

        const generateFullText = () => {
            if(!vehicleData) return "";
            const d = vehicleData, p = `${d.plate_region||''} ${d.plate_number||''} ${d.plate_series||''}`.trim().toUpperCase();
            return `Sumber : Aplikasi cs.id pro\n\nIDENTITAS PEMILIK : 🖋\nNo. Polisi : ${p}\nPemilik : ${d.owner_name || '-'}\nAlamat\t: ${d.owner_address || '-'}\nNik\t: ${d.nik || '-'}\nPekerjaan : ${d.job || '-'}\n\nDATA KENDARAAN: 🖋\nMerek\t: ${d.brand || '-'}\nTipe\t: ${d.model || '-'}\nTahun\t: ${d.manufacture_year || '-'}\nWarna\t: ${d.color || '-'}\nSilinder\t: ${d.engine_capacity || '-'} cc\nRoda\t: ${d.wheels || '0'}\nNo. Rangka\t: ${d.chassis_number || '-'}\nNo. Mesin\t: ${d.engine_number || '-'}\n\nDOKUMEN RESMI : 🖋\nNo. Bpkb\t: ${d.bpkb_number || '-'}\nNo. Stnk\t: ${d.stnk_number || '-'}\nTanggal Daftar \t: ${d.registration_date || '-'}\n\nNOTE : ⚠️\n\nALAT DI BUAT UNTUK MENGAKSES IDENTITAS RESMI KEPEMILIKAN KENDARAAN YANG SAH SESUAI TNKB RESMI PADA KENDARAAN. \n\nCP Link Aplikasi : CS.ID 👥\nhttps://wa.me/628136900872`;
        };

        window.copyToClipboard = () => {
            const text = generateFullText(); if(!text) return;
            const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            window.showSystemAlert("SALIN BERHASIL", "Laporan disalin sesuai format.");
        };

        window.shareToWA = () => {
            const text = generateFullText(); if(!text) return;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        };

        window.openRegWA = () => {
            const autoPin = Math.floor(100000 + Math.random() * 900000);
            const msg = encodeURIComponent(`Halo Admin CS.ID_PRO, mohon aktifkan PIN saya.\n\nKODE PIN: ${autoPin}\nMasa Aktif: 1 Bulan`);
            window.open(`https://wa.me/628136900872?text=${msg}`, '_blank');
        };

        window.navigateTo = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('fade-in');
            const isLogin = id === 'pageLogin';
            document.getElementById('appHeader').classList.toggle('hidden', isLogin);
            document.getElementById('bottomNavBar').classList.toggle('hidden', isLogin);
            if (window.lucide) window.lucide.createIcons();
        };

        window.handleSystemBack = () => { window.navigateTo('pageSearch'); };
        window.showSystemAlert = (t, m) => { document.getElementById('alertTitle').innerText = t; document.getElementById('alertBody').innerText = m; document.getElementById('modalAlert').style.display = 'flex'; };
        window.closeAlertModal = () => { document.getElementById('modalAlert').style.display = 'none'; };
        window.processLogout = () => { localStorage.clear(); location.reload(); };
        window.openRegisterModal = () => { document.getElementById('modalAddPin').style.display = 'flex'; };
        window.closeRegisterModal = () => { document.getElementById('modalAddPin').style.display = 'none'; };

        window.onload = async () => {
            if (window.lucide) window.lucide.createIcons();
            await initAuth();
            const saved = localStorage.getItem('csid_active_session');
            if(saved && currentUser) {
                try {
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'agents', saved));
                    if (snap.exists()) performLoginSuccess(snap.data());
                    else window.navigateTo('pageLogin');
                } catch(e) { window.navigateTo('pageLogin'); }
            } else window.navigateTo('pageLogin');
        };
    </script>
</body>
</html>
